# /etc/nginx/sites-available/dknexai
# DKnexAI Production Nginx Configuration
# Copy to: sudo cp /opt/dknexai/deploy/nginx/dknexai.conf /etc/nginx/sites-available/dknexai

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    # Certbot will add SSL block automatically below this

    # ── Angular Frontend (static dist) ───────────────────────
    root /opt/dknexai/FRONTEND/dist/dknex-ai-frontend/browser;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
    }

    # Cache hashed static assets aggressively
    location ~* \.(js|css|woff2|woff|ttf|ico|svg|png|jpg|webp)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Spring Boot Backend API ───────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;

        # Strip the /api prefix before forwarding
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8081;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        client_max_body_size  10M;

        # CORS
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,PATCH,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Rate-limit auth endpoints more strictly
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Internal health check (localhost only) ────────────────
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Gzip
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_vary       on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        font/woff2;
}
