# Spring Boot Production Configuration
# Active profile: prod
# Place at: /opt/dknexai/BACKEND/src/main/resources/application-prod.properties

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8081

# ── MySQL Database ────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/dknexai?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────────────
dknex.jwt.secret=${JWT_SECRET}
dknex.jwt.expiration=86400000

# ── Python AI Agent URLs (internal) ──────────────────────────────────────────
python.service.url=http://localhost:8000/run-agent
python.coding.service.url=http://localhost:8001/code-assist
python.rag.service.url=http://localhost:8002/ask
python.email.service.url=http://localhost:8080

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.dknex.ai=INFO
logging.level.org.springframework.security=WARN
logging.file.name=/opt/dknexai/logs/backend/spring.log
logging.file.max-size=50MB
logging.file.max-history=14

# ── Security ──────────────────────────────────────────────────────────────────
spring.security.filter.order=10
